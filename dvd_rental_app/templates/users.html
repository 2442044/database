<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員一覧 - DVDレンタルシステム</title> <!-- タイトルもDVD一覧から会員一覧に直しました -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">DVDレンタル</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/">ダッシュボード</a>
                <a class="nav-link" href="/dvds">DVD一覧</a>
                <a class="nav-link active" href="/users">会員一覧</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3>会員一覧</h3>
        </div>

        <table class="table table-hover bg-white shadow-sm rounded">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>名前</th>
                    <th>住所</th>
                    <th>電話番号</th>
                    <th>誕生日</th>
                    <th>登録日</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.user_id }}</td>
                    <td>{{ user.name }}</td>
                    <td>{{ user.address }}</td>
                    <td>{{ user.phone }}</td>
                    <td>{{ user.birth_date }}</td>
                    <td>{{ user.created_at }}</td>
                    <!-- ここにあったDVD用の不要なtdタグ2つを削除しました -->
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
